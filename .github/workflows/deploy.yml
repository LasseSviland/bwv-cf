name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm types:check
      - run: pnpm check
      - run: pnpm d1:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke test deployed Worker
        run: |
          curl --fail --silent --show-error --retry 6 --retry-all-errors --retry-delay 5 \
            https://better-wines-viner.sviland.workers.dev/ > /dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            https://better-wines-viner.sviland.workers.dev/api/v1/status)" = "401"
      - name: Clear and reload data from MySQL
        env:
          BWV_API_KEY: ${{ secrets.BWV_API_KEY }}
        run: |
          curl --fail --silent --show-error --request POST \
            --header "Authorization: Bearer ${BWV_API_KEY}" \
            https://better-wines-viner.sviland.workers.dev/api/v1/admin/reload > /dev/null
