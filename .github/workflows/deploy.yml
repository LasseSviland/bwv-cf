name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm types:check
      - run: pnpm check
      - run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke test deployed Worker
        run: |
          curl --fail --silent --show-error --retry 6 --retry-all-errors --retry-delay 5 \
            https://better-wines-viner.sviland.workers.dev/ > /dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            https://better-wines-viner.sviland.workers.dev/api/v1/status)" = "401"
